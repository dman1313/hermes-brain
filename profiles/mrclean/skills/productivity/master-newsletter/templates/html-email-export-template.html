<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>{{SUBJECT_LINE}}</title>
  </head>
  <body style="margin:0; padding:0; background-color:#f3f0ea; font-family:Georgia, 'Times New Roman', serif; color:#1e1a17;">
    <div style="display:none; max-height:0; overflow:hidden; opacity:0; mso-hide:all; visibility:hidden;">
      {{PREVIEW_TEXT}}
    </div>

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f3f0ea; margin:0; padding:32px 0; width:100%;">
      <tr>
        <td align="center">
          <table role="presentation" width="640" cellspacing="0" cellpadding="0" border="0" style="width:640px; max-width:640px; background-color:#fcfbf8; border:1px solid #ded7cc;">
            <tr>
              <td style="padding:22px 48px 10px 48px; font-family:Arial, Helvetica, sans-serif; font-size:11px; line-height:16px; letter-spacing:1.8px; text-transform:uppercase; color:#8b7f72;">
                {{NEWSLETTER_NAME}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 48px 10px 48px;">
                <div style="width:72px; height:1px; background-color:#b8aa97;"></div>
              </td>
            </tr>

            <tr>
              <td style="padding:8px 48px 12px 48px; font-size:36px; line-height:44px; font-weight:normal; color:#1e1a17; letter-spacing:-0.3px;">
                {{HEADLINE}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 48px 26px 48px; font-size:18px; line-height:30px; color:#5c5148;">
                {{HOOK}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 48px 28px 48px;">
                <img src="{{IMAGE_URL_1}}" alt="{{IMAGE_ALT_1}}" width="544" style="display:block; width:100%; max-width:544px; height:auto; border:0;" />
              </td>
            </tr>

            <tr>
              <td style="padding:0 48px 18px 48px; font-size:17px; line-height:30px; color:#2b2520;">
                {{BODY_SECTION_1}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 48px 18px 48px; font-size:17px; line-height:30px; color:#2b2520;">
                {{BODY_SECTION_2}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 48px 28px 48px; font-size:17px; line-height:30px; color:#2b2520;">
                {{BODY_SECTION_3}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 48px 36px 48px;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="background-color:#1f1a16; border-radius:999px; text-align:center;">
                      <a href="{{CTA_URL}}" style="display:inline-block; padding:14px 26px; font-family:Arial, Helvetica, sans-serif; font-size:13px; line-height:13px; letter-spacing:1px; text-transform:uppercase; color:#fcfbf8; text-decoration:none;">
                        {{CTA_TEXT}}
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding:0 48px 30px 48px; font-size:15px; line-height:26px; color:#5c5148;">
                {{SIGN_OFF}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 48px 18px 48px;">
                <div style="width:100%; height:1px; background-color:#e3ddd3;"></div>
              </td>
            </tr>

            <tr>
              <td style="padding:8px 48px 38px 48px; font-family:Arial, Helvetica, sans-serif; font-size:12px; line-height:20px; color:#8b7f72;">
                {{FOOTER_NOTE}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
