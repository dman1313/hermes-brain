<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>{{SUBJECT_LINE}}</title>
  </head>
  <body style="margin:0; padding:0; background-color:#eef4f8; font-family:Arial, Helvetica, sans-serif; color:#183247;">
    <div style="display:none; max-height:0; overflow:hidden; opacity:0; mso-hide:all; visibility:hidden;">
      {{PREVIEW_TEXT}}
    </div>

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#eef4f8; margin:0; padding:24px 0; width:100%;">
      <tr>
        <td align="center">
          <table role="presentation" width="640" cellspacing="0" cellpadding="0" border="0" style="width:640px; max-width:640px; background-color:#ffffff; border:1px solid #d6e2ea;">
            <tr>
              <td style="padding:28px 40px 10px 40px; font-size:12px; line-height:18px; letter-spacing:1.2px; text-transform:uppercase; color:#4d7187; font-weight:bold;">
                {{NEWSLETTER_NAME}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 40px 8px 40px;">
                <div style="width:84px; height:3px; background-color:#4c88b5;"></div>
              </td>
            </tr>

            <tr>
              <td style="padding:8px 40px 10px 40px; font-size:30px; line-height:38px; font-weight:bold; color:#183247;">
                {{HEADLINE}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 40px 22px 40px; font-size:18px; line-height:29px; color:#446173;">
                {{HOOK}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 40px 24px 40px;">
                <img src="{{IMAGE_URL_1}}" alt="{{IMAGE_ALT_1}}" width="560" style="display:block; width:100%; max-width:560px; height:auto; border:0;" />
              </td>
            </tr>

            <tr>
              <td style="padding:0 40px 16px 40px; font-size:16px; line-height:27px; color:#183247;">
                {{BODY_SECTION_1}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 40px 16px 40px; font-size:16px; line-height:27px; color:#183247;">
                {{BODY_SECTION_2}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 40px 26px 40px; font-size:16px; line-height:27px; color:#183247;">
                {{BODY_SECTION_3}}
              </td>
            </tr>

            <tr>
              <td style="padding:0 40px 32px 40px;">
                <a href="{{CTA_URL}}" style="display:inline-block; background-color:#2f6f9d; color:#ffffff; text-decoration:none; padding:14px 22px; font-size:15px; line-height:15px; font-weight:bold; border-radius:4px;">
                  {{CTA_TEXT}}
                </a>
              </td>
            </tr>

            <tr>
              <td style="padding:0 40px 26px 40px; font-size:15px; line-height:24px; color:#446173;">
                {{SIGN_OFF}}
              </td>
            </tr>

            <tr>
              <td style="padding:18px 40px 34px 40px; font-size:12px; line-height:19px; color:#5d7686; border-top:1px solid #dfe8ee; background-color:#f8fbfd;">
                {{FOOTER_NOTE}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
