model:
  default: deepseek-chat
  provider: deepseek
  base_url: https://api.deepseek.com/v1
providers:
  xiaomi:
    base_url: https://token-plan-ams.xiaomimimo.com/v1
    models:
      mimo-v2.5-pro:
        context_window: 1048576
        max_tokens: 131072
        reasoning: true
      mimo-v2.5:
        context_window: 1048576
        max_tokens: 131072
        reasoning: true
        vision: true
      mimo-v2-pro:
        context_window: 1048576
        max_tokens: 131072
        reasoning: true
      mimo-v2-omni:
        context_window: 262144
        max_tokens: 131072
        reasoning: true
        vision: true
  deepseek:
    base_url: https://api.deepseek.com/v1
    models:
      deepseek-reasoner:
        context_window: 65536
        max_tokens: 8192
        reasoning: true
      deepseek-chat:
        context_window: 131072
        max_tokens: 8192
        reasoning: false
      deepseek-v4-pro:
        context_window: 1048576
        max_tokens: 32768
        reasoning: true
      deepseek-v4-flash:
        context_window: 1048576
        max_tokens: 32768
        reasoning: true
fallback_providers:
- deepseek
fallback_model:
  provider: deepseek
  model: deepseek-chat
toolsets:
- hermes-cli
agent:
  max_turns: 60
  gateway_timeout: 1200
  restart_drain_timeout: 60
  api_max_retries: 3
  service_tier: ''
  tool_use_enforcement: auto
  reasoning_effort: high
  verbose: false
terminal:
  backend: local
  cwd: .
  timeout: 180
  persistent_shell: true
  lifetime_seconds: 300
web:
  backend: firecrawl
  use_gateway: true
browser:
  engine: auto
  cloud_provider: browser-use
  use_gateway: true
checkpoints:
  enabled: true
  max_snapshots: 50
  retention_days: 7
file_read_max_chars: 100000
tool_output:
  max_bytes: 50000
  max_lines: 2000
  max_line_length: 2000
tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
prompt_caching:
  cache_ttl: 5m
  long_lived_prefix: true
  long_lived_ttl: 1h
context:
  engine: compressor
delegation:
  model: deepseek-chat
  provider: deepseek
  max_iterations: 75
  child_timeout_seconds: 600
  reasoning_effort: high
  max_concurrent_children: 8
  max_spawn_depth: 1
  orchestrator_enabled: true
  default_toolsets:
  - terminal
  - file
  - web
memory:
  memory_enabled: true
  user_profile_enabled: false
display:
  show_reasoning: true
  streaming: true
  skin: default
privacy:
  redact_pii: false
security:
  redact_secrets: true
  tirith_enabled: true
  tirith_path: tirith
  tirith_timeout: 5
  tirith_fail_open: true
approvals:
  mode: manual
  timeout: 60
  cron_mode: deny
cron:
  wrap_response: true
  max_parallel_jobs: null
kanban:
  dispatch_in_gateway: true
  dispatch_interval_seconds: 60
  failure_limit: 2
smart_model_routing:
