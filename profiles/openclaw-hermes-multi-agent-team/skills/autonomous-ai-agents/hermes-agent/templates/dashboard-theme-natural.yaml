# Natural light theme — copy to ~/.hermes/dashboard-themes/natural.yaml
# White background, dark readable text, forest green accents
name: natural
label: Natural
description: Warm earth tones — cream, forest green, sage, and clay. A calm garden workspace.

palette:
  background:
    hex: "#ffffff"
    alpha: 1.0
  midground:
    hex: "#1a1816"
    alpha: 1.0
  foreground:
    hex: "#ffffff"
    alpha: 0.0
  warmGlow: "rgba(193, 127, 89, 0.15)"
  noiseOpacity: 0.25

typography:
  fontSans: "Inter, system-ui, sans-serif"
  fontMono: "JetBrains Mono, ui-monospace, monospace"
  fontDisplay: "Inter, system-ui, sans-serif"
  fontUrl: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
  baseSize: "16px"
  lineHeight: "1.6"
  letterSpacing: "0"

layout:
  radius: "0.875rem"
  density: comfortable

colorOverrides:
  primary: "#4a7c59"
  primaryForeground: "#ffffff"
  secondary: "#f7f4ee"
  secondaryForeground: "#1a1816"
  muted: "#f0ece6"
  mutedForeground: "#78716c"
  accent: "#4a7c59"
  accentForeground: "#ffffff"
  destructive: "#c47d7d"
  destructiveForeground: "#ffffff"
  border: "#d9d3c7"
  input: "#d9d3c7"
  ring: "#4a7c59"
  card: "#ffffff"
  cardForeground: "#1a1816"
  popover: "#ffffff"
  popoverForeground: "#1a1816"

componentStyles:
  card:
    boxShadow: "0 1px 4px rgba(0,0,0,0.04), inset 0 0 0 1px rgba(217, 211, 199, 0.5)"
  header:
    background: "linear-gradient(180deg, rgba(255,255,255,0.85), rgba(245,240,232,0.9))"
    backdropFilter: "blur(16px)"

customCSS: |
  /* Organic floating blobs */
  .dashboard-root::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.25;
    top: -150px; right: -100px;
    pointer-events: none;
    z-index: 0;
    animation: float-slow 25s ease-in-out infinite;
  }
  .dashboard-root::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    background: linear-gradient(135deg, #ffe0b2, #ffcc80);
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.2;
    bottom: -100px; left: -100px;
    pointer-events: none;
    z-index: 0;
    animation: float-slow 25s ease-in-out infinite;
    animation-delay: -12s;
  }
  @keyframes float-slow {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px,-30px) scale(1.08); }
    66% { transform: translate(-30px,20px) scale(0.95); }
  }
  
  .dashboard-root { position: relative; }
  
  [data-slot="sidebar"] {
    background: rgba(255,255,255,0.7) !important;
    backdrop-filter: blur(16px) !important;
    border-right: 1px solid #d9d3c7 !important;
  }
  
  [data-slot="sidebar"] .active {
    background: rgba(74,124,89,0.1) !important;
    color: #4a7c59 !important;
  }
  
  [data-component="card"] {
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1) !important;
    border: 1px solid #d9d3c7 !important;
  }
  [data-component="card"]:hover {
    transform: translateY(-4px) scale(1.01) !important;
    box-shadow: 0 12px 32px rgba(0,0,0,0.08) !important;
    border-color: #8faa8f !important;
  }
  
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d9d3c7; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #a39e96; }
  
  input, select {
    background: #ffffff !important;
    border: 1px solid #d9d3c7 !important;
    border-radius: 10px !important;
    color: #1a1816 !important;
  }
  input:focus, select:focus {
    border-color: #4a7c59 !important;
    box-shadow: 0 0 0 3px rgba(74,124,89,0.12) !important;
    outline: none !important;
  }
